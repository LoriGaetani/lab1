name: Backend CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Installa just
        uses: extractions/setup-just@v2

      # 1. ESEGUIAMO LA TUA RICETTA DI VERIFICA COMPLETA!
      - name: Esegui la verifica completa (Build, Test, Docker Run, Health Check)
        run: just verify

      - name: Login a GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # Usa in automatico il tuo username
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag e Push dell'immagine
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Il formato richiesto è ghcr.io/nome-utente/nome-repo/nome-immagine:tag
          IMAGE_ID=ghcr.io/${{ github.repository }}/cpo-backend
          
          # 1. Rinomina l'immagine locale creata da 'just verify'
          docker tag backend:latest $IMAGE_ID:latest
          
          # 2. Invia l'immagine al registro
          docker push $IMAGE_ID:latest