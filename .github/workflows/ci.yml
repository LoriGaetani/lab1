name: Backend CI Pipeline

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "master" ]

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Installa just
        uses: extractions/setup-just@v2

      - name: Esegui la verifica completa
        run: just verify

      - name: Estrai la versione dal Tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Login a GitHub Container Registry (GHCR)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag e Push dell'immagine (SemVer)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID=ghcr.io/$REPO_LOWER/cpo-backend

          docker tag backend:latest $IMAGE_ID:${{ env.VERSION }}
          docker push $IMAGE_ID:${{ env.VERSION }}

          echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV

      - name: Checkout repo Helm
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v4
        with:
          repository: LoriGaetani/DevOps
          token: ${{ secrets.HELM_REPO_PAT }}
          path: DevOps

      - name: Setup Python
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Installa PyYAML
        if: startsWith(github.ref, 'refs/tags/v')
        run: pip install pyyaml

      - name: Aggiorna values.yaml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python <<'PY'
          import yaml
          from pathlib import Path

          version = "${{ env.VERSION }}"
          image_id = "${{ env.IMAGE_ID }}"
          file_path = Path("DevOps/cpo-backend-chart/values.yaml")

          data = yaml.safe_load(file_path.read_text())

          if "image" not in data:
              data["image"] = {}

          data["image"]["repository"] = image_id
          data["image"]["tag"] = version

          file_path.write_text(
              yaml.safe_dump(data, sort_keys=False, default_flow_style=False)
          )
          PY

      - name: Commit e push del chart aggiornato
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd DevOps
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cpo-backend-chart/values.yaml

          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare"
            exit 0
          fi

          git commit -m "chore(cpo-backend): bump image to ${{ env.VERSION }}"
          git push